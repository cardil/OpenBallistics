name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test -x jvmTest -x generateFixtures -x setupFixturesVenv -x installFixturesDeps

      - name: Test
        run: ./gradlew :core:jvmTest

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 7

  extended-fixture-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extended fixture test (1000 fixtures × 5 checkpoints)
        run: ./gradlew :core:jvmTest --tests '*FixtureTest*'
        env:
          FIXTURE_COUNT: 1000
          FIXTURE_CHECKPOINTS: 5

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extended-test-results
          path: '**/build/reports/tests/'
          retention-days: 7
